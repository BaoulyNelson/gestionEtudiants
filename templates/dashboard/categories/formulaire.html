{% extends 'dashboard/base_dashboard.html' %}
{% block dash_titre %}{{ titre_page }}{% endblock %}
{% block dash_contenu %}
<div class="row ">
  <div class="col-md-12">
    <div class="dash-card">
      <div class="dash-card-header"><h5 class="dash-card-title">{{ titre_page }}</h5></div>
      <div class="dash-card-body">
        <form method="post" enctype="multipart/form-data" novalidate>
          {% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label fw-medium">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div class="invalid-feedback d-block">{{ field.errors.0 }}</div>{% endif %}
          </div>
          {% endfor %}
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>Enregistrer</button>
            <a href="{% url 'articles:dashboard_categories' %}" class="btn btn-outline-secondary">Annuler</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
