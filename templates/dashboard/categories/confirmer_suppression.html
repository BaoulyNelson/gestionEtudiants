{% extends 'dashboard/base_dashboard.html' %}
{% block dash_titre %}Supprimer une catégorie{% endblock %}
{% block dash_contenu %}
<div class="row">
  <div class="col-md-12">
    <div class="dash-card">
      <div class="dash-card-body text-center py-4">
        <i class="fas fa-folder-minus fa-3x text-danger mb-3"></i>
        <h5>Supprimer la catégorie « {{ object.nom }} » ?</h5>
        <p class="small text-danger">Les articles liés seront sans catégorie.</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex justify-content-center gap-3 mt-3">
            <button type="submit" class="btn btn-danger px-4"><i class="fas fa-trash me-2"></i>Supprimer</button>
            <a href="{% url 'articles:dashboard_categories' %}" class="btn btn-outline-secondary px-4">Annuler</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
