{% extends 'dashboard/base_dashboard.html' %}
{% block dash_titre %}Supprimer l'annonce{% endblock %}
{% block dash_contenu %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="dash-card">
      <div class="dash-card-header"><h5 class="dash-card-title text-danger"><i class="fas fa-exclamation-triangle me-2"></i>Confirmer la suppression</h5></div>
      <div class="dash-card-body text-center py-4">
        <i class="fas fa-trash-alt fa-3x text-danger mb-3"></i>
        <h5>Voulez-vous supprimer cette annonce ?</h5>
        <p class="text-muted">« {{ object.titre }} »</p>
        <p class="small text-danger">Cette action est irréversible.</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex justify-content-center gap-3 mt-3">
            <button type="submit" class="btn btn-danger px-4"><i class="fas fa-trash me-2"></i>Supprimer</button>
            <a href="{% url 'articles:dashboard_annonces' %}" class="btn btn-outline-secondary px-4">Annuler</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
